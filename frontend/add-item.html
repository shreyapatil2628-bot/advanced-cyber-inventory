<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Item – Cyber Inventory</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #070d1a;
      --panel: #0c1527;
      --panel2: #0f1e35;
      --border: #1a3050;
      --accent: #00d4ff;
      --green: #00ff9d;
      --text: #c8e0f0;
      --muted: #4a7a9b;
      --error: #ff4d6a;
      --font: 'Rajdhani', sans-serif;
      --mono: 'Share Tech Mono', monospace;
    }
    html, body { height:100%; background:var(--bg); font-family:var(--font); color:var(--text); }
 
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index:0; pointer-events:none;
    }
 
    /* NAV */
    nav {
      position: relative; z-index: 10;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; font-weight: 700; letter-spacing: 3px;
      color: var(--accent); text-transform: uppercase;
    }
    .nav-brand .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
 
    .nav-links { display:flex; gap:4px; align-items:center; }
    .nav-links a {
      padding: 7px 16px;
      font-size: 12px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; text-decoration: none;
      color: var(--muted); border-radius: 3px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--accent); background: rgba(0,212,255,0.06); }
    .nav-links a.active { color: var(--accent); border-color: var(--border); background: var(--panel2); }
    .nav-links .sep { width:1px; height:20px; background:var(--border); margin:0 4px; }
    .btn-logout {
      padding: 6px 14px; font-size: 11px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; border-radius: 3px;
      border: 1px solid var(--error); color: var(--error);
      background: transparent; font-family: var(--font);
      transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(255,77,106,0.1); }
 
    /* USER chip */
    .nav-user {
      display: flex; align-items: center; gap: 14px;
    }
    .user-chip {
      font-size: 11px; font-family: var(--mono);
      color: var(--muted); letter-spacing: 1px;
    }
    .user-chip span { color: var(--green); }
 
    /* MAIN LAYOUT */
    .main {
      position: relative; z-index: 1;
      max-width: 760px; margin: 40px auto; padding: 0 24px;
    }
 
    .page-title {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px;
    }
    .page-title-icon {
      width: 40px; height: 40px;
      border: 1px solid var(--accent);
      border-radius: 3px; display: flex; align-items: center; justify-content: center;
      color: var(--accent);
    }
    .page-title h1 {
      font-size: 20px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--text);
    }
    .page-title p { font-size: 11px; color: var(--muted); font-family: var(--mono); letter-spacing: 1px; margin-top: 2px; }
 
    /* CARD */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px 32px;
    }
 
    /* Form sections */
    .section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 3px;
      color: var(--accent); text-transform: uppercase;
      font-family: var(--mono);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
 
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .form-grid.full { grid-template-columns: 1fr; }
    .form-grid.triple { grid-template-columns: 1fr 1fr 1fr; }
 
    .field { display: flex; flex-direction: column; gap: 7px; }
    .field label {
      font-size: 11px; font-weight: 600; letter-spacing: 2px;
      color: var(--muted); text-transform: uppercase; font-family: var(--mono);
    }
 
    .field input, .field select, .field textarea {
      padding: 10px 14px;
      background: rgba(0,212,255,0.04);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
      background: rgba(0,212,255,0.06);
    }
    .field input::placeholder, .field textarea::placeholder { color: #1e3a50; }
    .field select option { background: #0c1527; color: var(--accent); }
    .field textarea { resize: vertical; min-height: 80px; }
    .field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5) sepia(1) saturate(10) hue-rotate(170deg); }
 
    .mb-section { margin-bottom: 24px; }
 
    /* Submit row */
    .submit-row {
      display: flex; align-items: center; gap: 16px;
      margin-top: 28px; padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .btn-save {
      flex: 1; padding: 13px;
      background: var(--accent); color: #070d1a;
      border: none; border-radius: 3px;
      font-family: var(--font); font-size: 14px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-save:hover { background: #00eaff; box-shadow: 0 0 20px rgba(0,212,255,0.25); }
    .btn-clear {
      padding: 13px 24px;
      background: transparent;
      border: 1px solid var(--border); border-radius: 3px;
      color: var(--muted); font-family: var(--font);
      font-size: 13px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .btn-clear:hover { border-color: var(--muted); color: var(--text); }
 
    /* Toast notification */
    #toast {
      position: fixed; bottom: 28px; right: 28px;
      padding: 14px 22px; border-radius: 4px;
      font-family: var(--mono); font-size: 13px; letter-spacing: 1px;
      display: none; z-index: 999;
      border-left: 3px solid;
      animation: slideIn 0.3s ease;
    }
    #toast.success { background: #071a10; border-color: var(--green); color: var(--green); }
    #toast.error   { background: #1a0710; border-color: var(--error); color: var(--error); }
    @keyframes slideIn { from{transform:translateX(20px);opacity:0} to{transform:none;opacity:1} }
  </style>
</head>
<body>
 
<nav>
  <div class="nav-brand">
    <div class="dot"></div>
    Cyber Inventory
  </div>
  <div class="nav-links">
    <a href="add-item.html" class="active">Add Item</a>
    <a href="update-item.html">Update / Delete</a>
    <a href="report.html">Report</a>
    <div class="sep"></div>
  </div>
  <div class="nav-user">
    <span class="user-chip">USER: <span id="navUser">—</span></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>
 
<div class="main">
  <div class="page-title">
    <div class="page-title-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </div>
    <div>
      <h1>Add New Item</h1>
      <p>// ENTER INVENTORY RECORD</p>
    </div>
  </div>
 
  <div class="card">
 
    <div class="section-label mb-section">01 — Item Identification</div>
    <div class="form-grid mb-section">
      <div class="field">
        <label>Item ID</label>
        <input type="text" id="item_id" placeholder="e.g. ITM-001">
      </div>
      <div class="field">
        <label>Item Name</label>
        <input type="text" id="item_name" placeholder="Enter item name">
      </div>
    </div>
 
    <div class="section-label mb-section">02 — Classification</div>
    <div class="form-grid mb-section">
      <div class="field">
        <label>Type</label>
        <select id="type">
          <option value="">-- Select Type --</option>
          <option>Hardware</option>
          <option>Software</option>
          <option>Network Equipment</option>
          <option>Security Device</option>
          <option>Storage</option>
          <option>Peripheral</option>
          <option>Server Component</option>
          <option>Cable / Connector</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Save Record?</label>
        <select id="saved">
          <option value="yes">Yes — Save to database</option>
          <option value="no">No — Draft only</option>
        </select>
      </div>
    </div>
 
    <div class="form-grid full mb-section">
      <div class="field">
        <label>Description</label>
        <textarea id="description" placeholder="Enter item description, specifications, notes..."></textarea>
      </div>
    </div>
 
    <div class="section-label mb-section">03 — Quantity & Date</div>
    <div class="form-grid mb-section">
      <div class="field">
        <label>Enter Date</label>
        <input type="date" id="enter_date">
      </div>
      <div class="field">
        <label>Quantity Received</label>
        <input type="number" id="quantity_received" min="1" placeholder="0">
      </div>
    </div>
 
    <div class="submit-row">
      <button class="btn-clear" onclick="clearForm()">Clear Form</button>
      <button class="btn-save" onclick="addItem()">Save Item</button>
    </div>
 
  </div>
</div>
 
<div id="toast"></div>
 
<script>
  const token = localStorage.getItem('token');
  if (!token) window.location.href = 'login.html';
  document.getElementById('navUser').textContent = (localStorage.getItem('username') || '—').toUpperCase();
 
  // Set today's date as default
  document.getElementById('enter_date').valueAsDate = new Date();
 
  function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
  }
 
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = type;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3500);
  }
 
  function clearForm() {
    ['item_id','item_name','description','quantity_received'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('type').value = '';
    document.getElementById('saved').value = 'yes';
    document.getElementById('enter_date').valueAsDate = new Date();
  }
 
  async function addItem() {
    const fields = {
      item_id: document.getElementById('item_id').value.trim(),
      item_name: document.getElementById('item_name').value.trim(),
      description: document.getElementById('description').value.trim(),
      type: document.getElementById('type').value,
      enter_date: document.getElementById('enter_date').value,
      quantity_received: parseInt(document.getElementById('quantity_received').value),
      saved: document.getElementById('saved').value
    };
 
    if (!fields.item_id || !fields.item_name || !fields.type || !fields.enter_date || !fields.quantity_received) {
      showToast('⚠ Please fill all required fields', 'error');
      return;
    }
 
    try {
      const res = await fetch('/api/items/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(fields)
      });
      const data = await res.json();
      if (data.message) {
        showToast('✔ Item saved successfully', 'success');
        clearForm();
      } else {
        showToast('✖ ' + (data.error || 'Failed to save'), 'error');
      }
    } catch (e) {
      showToast('✖ Server error. Is the server running?', 'error');
    }
  }
</script>
</body>
</html>
