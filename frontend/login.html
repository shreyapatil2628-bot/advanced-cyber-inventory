<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Advanced Cyber Inventory Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
 
    :root {
      --bg: #070d1a;
      --panel: #0c1527;
      --border: #1a3050;
      --accent: #00d4ff;
      --accent2: #0095cc;
      --green: #00ff9d;
      --text: #c8e0f0;
      --muted: #4a7a9b;
      --error: #ff4d6a;
      --font-main: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }
 
    html, body {
      height: 100%;
      background: var(--bg);
      font-family: var(--font-main);
      color: var(--text);
      overflow: hidden;
    }
 
    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
      animation: gridScroll 20s linear infinite;
    }
 
    @keyframes gridScroll {
      0% { background-position: 0 0; }
      100% { background-position: 0 40px; }
    }
 
    /* Scanning line */
    body::after {
      content: '';
      position: fixed;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 6s linear infinite;
      z-index: 1;
      opacity: 0.4;
    }
 
    @keyframes scan {
      0% { top: -5%; }
      100% { top: 105%; }
    }
 
    .page-center {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
 
    /* Logo / Header */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.6s ease;
    }
 
    .logo-icon {
      width: 64px; height: 64px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      position: relative;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
    }
 
    .logo-icon::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 1px solid rgba(0,212,255,0.3);
    }
 
    .logo-icon svg { width: 28px; height: 28px; fill: var(--accent); }
 
    .logo-title {
      font-size: 11px;
      letter-spacing: 6px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
 
    .logo-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      line-height: 1.1;
    }
 
    .logo-name span { color: var(--green); }
 
    /* Login Card */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 36px 32px;
      position: relative;
      animation: fadeUp 0.7s ease;
    }
 
    /* Corner decorations */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--accent);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
 
    .card-inner::before, .card-inner::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--accent);
      border-style: solid;
    }
    .card-inner::before { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .card-inner::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
 
    .card-header {
      text-align: center;
      margin-bottom: 28px;
    }
 
    .card-header h2 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--text);
      text-transform: uppercase;
    }
 
    .card-header p {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 2px;
      margin-top: 4px;
      font-family: var(--font-mono);
    }
 
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 24px;
    }
 
    .field { margin-bottom: 20px; }
 
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
      font-family: var(--font-mono);
    }
 
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
 
    .input-wrap .icon {
      position: absolute;
      left: 12px;
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
    }
 
    .field input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      background: rgba(0,212,255,0.04);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: 1px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
 
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
      background: rgba(0,212,255,0.06);
    }
 
    .field input::placeholder { color: #2a4a60; }
 
    .btn-login {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: var(--accent);
      color: #070d1a;
      border: none;
      border-radius: 3px;
      font-family: var(--font-main);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
 
    .btn-login:hover {
      background: #00eaff;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
    }
 
    .btn-login:active { transform: scale(0.99); }
 
    .btn-login.loading { opacity: 0.7; pointer-events: none; }
 
    #msg {
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      font-family: var(--font-mono);
      min-height: 18px;
      color: var(--error);
      letter-spacing: 1px;
    }
 
    .footer-note {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
      letter-spacing: 1px;
    }
 
    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:none; } }
  </style>
</head>
<body>
<div class="page-center">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="logo-title">Enterprise System</div>
    <div class="logo-name">Advanced Cyber<br><span>Inventory</span> Tracker</div>
  </div>
 
  <div class="card card-inner">
    <div class="card-header">
      <h2>Secure Access</h2>
      <p>// AUTHENTICATE TO CONTINUE</p>
    </div>
    <hr class="divider">
 
    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username">
      </div>
    </div>
 
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') login()">
      </div>
    </div>
 
    <button class="btn-login" id="loginBtn" onclick="login()">Login</button>
    <div id="msg"></div>
 
    <div class="footer-note">Protected System — Authorized Access Only</div>
  </div>
</div>
 
<script>
  async function login() {
    const btn = document.getElementById('loginBtn');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const msg = document.getElementById('msg');
    msg.textContent = '';
 
    if (!username || !password) {
      msg.textContent = '⚠ Please enter both username and password';
      return;
    }
 
    btn.textContent = 'AUTHENTICATING...';
    btn.classList.add('loading');
 
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
 
      if (data.token) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        btn.textContent = 'ACCESS GRANTED ✓';
        setTimeout(() => { window.location.href = 'add-item.html'; }, 600);
      } else {
        msg.textContent = '✖ ' + (data.error || 'Authentication failed');
        btn.textContent = 'LOGIN';
        btn.classList.remove('loading');
      }
    } catch (e) {
      msg.textContent = '✖ Server unreachable. Is the server running?';
      btn.textContent = 'LOGIN';
      btn.classList.remove('loading');
    }
  }
</script>
</body>
</html>
